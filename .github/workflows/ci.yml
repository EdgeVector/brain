name: ci

on:
  merge_group:
  push:
    branches: [main]
  pull_request:

# `ci-required` is the protected status name expected by branch protection.
# Keep the job name matching that string verbatim so the GitHub status check
# resolves cleanly when merging.
jobs:
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    env:
      # Integration tests need a local fold_db_node + schema_service — not
      # available in CI. The harness's isHarnessAvailable() short-circuit
      # turns them into clean `skip` reports.
      FBRAIN_SKIP_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin avoids setup-bun's GitHub API lookup for "latest" which
          # currently 401s on fresh repos with default GITHUB_TOKEN scope.
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration-skip tests
        run: bun test --timeout 60000

      # Phase 7 G3b — retrieval eval harness. Non-blocking: prints P@1/3/5+MRR
      # to the build log so we can track quality over time, but does NOT fail
      # the build. The runner self-skips when ~/.fbrain/config.json is absent
      # (CI has no node), so in CI today this step just logs "skipping".
      # TODO: once we have ≥7 days of runs, gate on a P@1 floor — see
      # docs/phase-7-search-latency-spike.md G3b.
      - name: Retrieval eval (non-blocking)
        if: always()
        continue-on-error: true
        run: bun scripts/eval-retrieval.ts --format table+json
