name: ci

on:
  merge_group:
  push:
    branches: [main]
  pull_request:

# `ci-required` is the protected status name expected by branch protection.
# Keep the job name matching that string verbatim so the GitHub status check
# resolves cleanly when merging.
jobs:
  ci-required:
    name: ci-required
    runs-on: ubuntu-latest
    env:
      # Integration tests need a local fold_db_node + schema_service — not
      # available in CI. The harness's isHarnessAvailable() short-circuit
      # turns them into clean `skip` reports.
      FBRAIN_SKIP_INTEGRATION: "1"
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          # Pin avoids setup-bun's GitHub API lookup for "latest" which
          # currently 401s on fresh repos with default GITHUB_TOKEN scope.
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Unit + integration-skip tests
        run: bun test --timeout 60000

      # Phase 7 G3b — retrieval eval harness. Non-blocking: prints P@1/3/5+MRR
      # to the build log so we can track quality over time, but does NOT fail
      # the build. The runner self-skips when ~/.fbrain/config.json is absent
      # (CI has no node), so in CI today this step just logs "skipping".
      # TODO: once we have ≥7 days of runs, gate on a P@1 floor — see
      # docs/phase-7-search-latency-spike.md G3b.
      - name: Retrieval eval (non-blocking)
        if: always()
        continue-on-error: true
        run: bun scripts/eval-retrieval.ts --format table+json

  # Model C Phase 2 — compile + sign the standalone `fbrain-mcp` binary and
  # prove it boots the MCP stdio surface. Runs on macOS because the binary's
  # code-signature must match the `folddb.toml` [code_signature] block
  # (bundle id com.edgevector.fbrain) and `codesign` is macOS-only — the
  # signature is the platform-relevant artifact the node attests. Reports as a
  # distinct status check; the merge queue waits on `ci-required` (above).
  build-mcp-binary:
    name: build-mcp-binary
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.10"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      # Ad-hoc sign by default; set CODESIGN_IDENTITY (+ org APPLE_* secrets)
      # to switch to a real Developer ID without touching this workflow.
      - name: Compile + sign fbrain-mcp
        run: bun run build:mcp

      - name: Verify signature matches manifest bundle id
        run: |
          codesign -dv dist/fbrain-mcp 2>&1 | tee /tmp/codesign.txt
          grep -q 'Identifier=com.edgevector.fbrain' /tmp/codesign.txt
          codesign --verify --verbose dist/fbrain-mcp

      # Boot the COMPILED binary directly (not via `bun run`) and confirm the
      # MCP handshake returns all 9 fbrain tools — exactly the new-dev path.
      - name: Smoke-test the compiled MCP surface
        run: |
          printf '%s\n%s\n' \
            '{"jsonrpc":"2.0","id":1,"method":"initialize","params":{"protocolVersion":"2024-11-05","capabilities":{},"clientInfo":{"name":"ci","version":"1"}}}' \
            '{"jsonrpc":"2.0","id":2,"method":"tools/list","params":{}}' \
            | ./dist/fbrain-mcp 2>/tmp/mcp-stderr.log > /tmp/mcp-out.txt
          cat /tmp/mcp-stderr.log
          n=$(bun -e 'const ls=require("fs").readFileSync("/tmp/mcp-out.txt","utf8").trim().split("\n"); const r=JSON.parse(ls[1]); const names=r.result.tools.map(t=>t.name); console.log(names.join(",")); process.stderr.write(String(names.length));' 2>/tmp/mcp-count.txt)
          echo "tools: $n"
          test "$(cat /tmp/mcp-count.txt)" = "9"

      - name: Upload fbrain-mcp artifact
        uses: actions/upload-artifact@v4
        with:
          name: fbrain-mcp
          path: dist/fbrain-mcp
          if-no-files-found: error
